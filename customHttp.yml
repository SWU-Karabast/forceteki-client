customHeaders:
  - pattern: '**/*.png'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000'
  - pattern: '**/*.jpg'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000'
  - pattern: '**/*.jpeg'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000'
  - pattern: '**/*.webp'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000'
  - pattern: '**/*.svg'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000'
  - pattern: '**/*.mp3'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000'
  - pattern: '**/*.mp4'
    headers:
      - key: 'Cache-Control'
        value: 'public, max-age=31536000'
